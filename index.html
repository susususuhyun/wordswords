<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>메타인지 어원 단어장 (13~15강)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700;800&display=swap');
        body { font-family: 'Pretendard', sans-serif; background-color: #f0fdfa; overflow-x: hidden; }
        ::-webkit-scrollbar { width: 0px; background: transparent; }

        .accordion-content { transition: max-height 0.35s ease-in-out, padding 0.35s ease-in-out, opacity 0.35s ease-in-out; max-height: 0; opacity: 0; overflow: hidden; }
        .accordion-content.open { max-height: 400px; opacity: 1; padding-top: 1rem; padding-bottom: 1rem; }
        
        .perspective-1000 { perspective: 1000px; }
        .transform-style-3d { transform-style: preserve-3d; }
        .backface-hidden { backface-visibility: hidden; }
        .rotate-y-180 { transform: rotateY(180deg); }
        .flip-card-inner { transition: transform 0.6s cubic-bezier(0.4, 0.2, 0.2, 1); }

        .tab-btn.active { color: #0f766e; border-bottom-color: #0f766e; font-weight: 800; background-color: #ccfbf1; }

        .app-container { max-width: 480px; margin: 0 auto; background-color: #ffffff; min-height: 100vh; position: relative; box-shadow: 0 10px 30px rgba(0,0,0,0.08); }
    </style>
</head>
<body>

<div class="app-container flex flex-col h-screen overflow-hidden">
    
    <header class="bg-teal-700 text-white p-4 sticky top-0 z-20 flex justify-between items-center shadow-lg rounded-b-xl">
        <div>
            <h1 class="text-xl font-extrabold tracking-tight"><i class="fa-solid fa-layer-group mr-2"></i>메타인지 단어장</h1>
            <p class="text-xs text-teal-100 mt-1 font-medium">13강(쇼핑) · 14강(스포츠) · 15강(여행)</p>
        </div>
        <button onclick="toggleMode()" id="modeToggleBtn" class="bg-white text-teal-700 px-3 py-1.5 rounded-full text-sm font-bold shadow-md hover:bg-teal-50 transition transform active:scale-95">
            <i class="fa-solid fa-clone mr-1"></i> 카드모드
        </button>
    </header>

    <div class="flex bg-white shadow-sm sticky top-[72px] z-10 border-b border-gray-200">
        <button id="tab-13" onclick="setLesson(13)" class="tab-btn active flex-1 py-3.5 text-sm text-gray-500 border-b-2 border-transparent transition duration-200"><i class="fa-solid fa-cart-shopping mr-1"></i> 13강</button>
        <button id="tab-14" onclick="setLesson(14)" class="tab-btn flex-1 py-3.5 text-sm text-gray-500 border-b-2 border-transparent transition duration-200"><i class="fa-solid fa-medal mr-1"></i> 14강</button>
        <button id="tab-15" onclick="setLesson(15)" class="tab-btn flex-1 py-3.5 text-sm text-gray-500 border-b-2 border-transparent transition duration-200"><i class="fa-solid fa-plane-departure mr-1"></i> 15강</button>
    </div>

    <main id="listView" class="flex-1 overflow-y-auto p-4 space-y-6 pb-24 bg-gray-50">
        <!-- JS 렌더링 영역 -->
    </main>

    <div id="flashcardView" class="hidden absolute inset-0 bg-gray-900 bg-opacity-95 z-30 flex-col pb-10">
        <div class="flex justify-between items-center p-5 text-white">
            <span id="flashcardCounter" class="text-sm font-bold bg-gray-800 px-4 py-1.5 rounded-full border border-gray-600 shadow-inner">1 / 50</span>
            <button onclick="toggleMode()" class="text-gray-400 hover:text-white transition transform hover:rotate-90"><i class="fa-solid fa-xmark text-3xl"></i></button>
        </div>

        <div class="flex-1 flex items-center justify-center p-6 w-full perspective-1000">
            <div id="flashcard" class="w-full h-[68vh] max-w-sm relative transform-style-3d flip-card-inner cursor-pointer" onclick="flipCard()">
                
                <!-- 플래시카드 앞면 -->
                <div class="absolute inset-0 w-full h-full bg-white rounded-3xl shadow-2xl backface-hidden flex flex-col justify-center items-center p-8 text-center border-b-8 border-teal-500">
                    <span id="cardGroup" class="absolute top-6 text-xs font-bold text-teal-800 bg-teal-100 px-3 py-1 rounded-full border border-teal-200">그룹</span>
                    <h2 id="cardWord" class="text-4xl font-black text-gray-800 mb-4 tracking-tight break-words">Word</h2>
                    <p class="text-gray-400 text-sm mt-6 font-medium animate-pulse"><i class="fa-solid fa-hand-pointer mr-2"></i>카드를 눌러 어원 보기</p>
                </div>

                <!-- 플래시카드 뒷면 -->
                <div class="absolute inset-0 w-full h-full bg-teal-800 rounded-3xl shadow-2xl backface-hidden rotate-y-180 flex flex-col p-6 text-white overflow-y-auto border-b-8 border-teal-950">
                    <h2 id="cardWordBack" class="text-2xl font-bold mb-2 border-b border-teal-600 pb-2 text-teal-200">Word</h2>
                    <p id="cardMeaning" class="text-2xl font-black mb-5 text-white">의미</p>
                    
                    <div class="bg-teal-900 bg-opacity-50 rounded-xl p-4 mb-4 shadow-inner">
                        <p class="text-[0.7rem] text-teal-300 mb-2 font-bold uppercase tracking-wider"><i class="fa-solid fa-book-open mr-1"></i> 어원 스토리 (Semantic Shift)</p>
                        <p id="cardRoot" class="text-sm leading-relaxed text-teal-50 font-medium">어원 설명</p>
                    </div>
                    
                    <div class="bg-teal-900 bg-opacity-50 rounded-xl p-4 shadow-inner">
                        <p class="text-[0.7rem] text-amber-300 mb-2 font-bold uppercase tracking-wider"><i class="fa-solid fa-link mr-1"></i> 동계어 (Family)</p>
                        <p id="cardCognates" class="text-sm font-bold text-amber-100">동계어 설명</p>
                    </div>
                </div>
            </div>
        </div>

        <div class="flex justify-center items-center space-x-8 px-6 pb-4">
            <button onclick="prevCard()" class="w-16 h-16 rounded-full bg-gray-700 text-white flex justify-center items-center active:bg-gray-600 hover:bg-gray-600 transition transform active:scale-90 shadow-xl border border-gray-600">
                <i class="fa-solid fa-chevron-left text-2xl"></i>
            </button>
            <button onclick="nextCard()" class="w-16 h-16 rounded-full bg-teal-500 text-white flex justify-center items-center active:bg-teal-400 hover:bg-teal-400 transition transform active:scale-90 shadow-[0_0_20px_rgba(20,184,166,0.4)]">
                <i class="fa-solid fa-chevron-right text-2xl"></i>
            </button>
        </div>
    </div>
</div>

<script>
    const db = {
        // ==========================================
        // 13강: 쇼핑, 소비, 상업 (50단어)
        // ==========================================
        13: [
            // [상업과 판매]
            { word: "merchandise", meaning: "상품", root: "merc(장사하다) + andise → 여러 상인들이 시장에 모여 왁자지껄하게 사고파는 모든 '상품'들을 통틀어 이르는 말.", cognates: "merchant(상인), commerce(상업)", group: "1. 상업과 판매 (-merc-, -tail-)" },
            { word: "merchandiser", meaning: "판매자", root: "merc(장사하다) + er → 단순히 물건을 넘기는 사람이 아니라, 상품(merchandise)을 기획하고 유통하여 '판매하는 사람'.", cognates: "merchandise(상품)", group: "1. 상업과 판매 (-merc-, -tail-)" },
            { word: "retailer", meaning: "소매상", root: "re(다시) + tail(자르다) → 도매상에서 덩어리로 사 온 물건을 일반 소비자에게 조금씩 '다시 잘게 잘라서 파는' 소매상.", cognates: "detail(세부사항), tailor(재단사)", group: "1. 상업과 판매 (-merc-, -tail-)" },
            { word: "wholesale", meaning: "도매", root: "whole(전체) + sale(판매) → 물건을 낱개로 쪼개지 않고 창고에 있는 '전체(whole)' 덩어리째로 한꺼번에 대량으로 파는 '도매'.", cognates: "whole(전체의)", group: "1. 상업과 판매 (-merc-, -tail-)" },
            { word: "bargain sale", meaning: "염가 판매 (싼값으로 판매하는 것)", root: "bargain(흥정, 싼 물건) + sale → 상인과 손님이 치열하게 가격을 깎고 흥정하여 아주 '싸게 파는(sale)' 행사.", cognates: "bargain(흥정하다)", group: "1. 상업과 판매 (-merc-, -tail-)" },
            { word: "sales slip", meaning: "영수증", root: "sale(판매) + slip(종이조각) → 물건을 판매한(sale) 내역이 길쭉하고 얇게 찢어진 '종이조각(slip)'에 인쇄되어 나오는 '영수증'.", cognates: "slippers(슬리퍼)", group: "1. 상업과 판매 (-merc-, -tail-)" },

            // [구매와 가치]
            { word: "buy", meaning: "사다", root: "고대 영어 bycgan(돈을 내고 얻다) → 물건을 돈을 지불하고 나의 소유로 만드는 가장 기본적인 행위.", cognates: "buyer(구매자)", group: "2. 구매와 가치 (-pur-, -val-)" },
            { word: "purchaser", meaning: "구매자", root: "pur(앞으로) + chase(쫓다) + er → 원하는 물건을 얻기 위해 돈을 들고 앞으로 맹렬히 '쫓아가서 쟁취하는 사람(구매자)'.", cognates: "purchase(구매), chase(추격하다)", group: "2. 구매와 가치 (-pur-, -val-)" },
            { word: "make a purchase of", meaning: "~을 구입하다", root: "purchase(구입)를 make(하다) → 단순히 'buy'보다 더 격식을 갖춰 중요한 물건을 '구입하는 행동을 취하다'.", cognates: "purchase(구매하다)", group: "2. 구매와 가치 (-pur-, -val-)" },
            { word: "valuable", meaning: "가치가 있는, 값비싼", root: "val(강하다, 가치) + uable → 흔해서 쓸모없는 것이 아니라, 내게 아주 강력한(val) 힘과 쓸모를 지녀 '값비싸고 가치 있는'.", cognates: "value(가치), evaluate(평가하다)", group: "2. 구매와 가치 (-pur-, -val-)" },
            { word: "at a reasonable price", meaning: "적당한 가격에", root: "reason(이성, 계산) + able → 터무니없이 비싼 것이 아니라, 머리로 이성적으로 '계산했을 때' 딱 납득이 가는 '적당한 가격'.", cognates: "rational(합리적인), reason(이유)", group: "2. 구매와 가치 (-pur-, -val-)" },
            { word: "reason", meaning: "이유, 이치", root: "라틴어 reri(계산하다, 생각하다) → 왜 그런 일이 일어났는지 머릿속으로 '계산하고 따져보아' 나오는 타당한 '이치나 이유'.", cognates: "rate(비율)", group: "2. 구매와 가치 (-pur-, -val-)" },

            // [품질과 속성]
            { word: "quality", meaning: "질", root: "qual(어떤 종류의, 성질) + ity → 물건이 단순히 양이 많은지가 아니라, 얼마나 훌륭한 '성질과 본바탕'을 가지고 있는지 나타내는 '질'.", cognates: "qualify(자격을 주다)", group: "3. 품질과 속성 (-qual-, -tend-)" },
            { word: "quality time", meaning: "양질의 시간", root: "quality(질 좋은) + time(시간) → 그저 흘려보내는 시간이 아니라, 가족이나 소중한 사람과 온전히 집중해서 보내는 '가치 있는 시간'.", cognates: "quality(질)", group: "3. 품질과 속성 (-qual-, -tend-)" },
            { word: "qualify", meaning: "~에게 자격을 주다", root: "qual(성질) + fy(만들다) → 어떤 직업이나 대회에 나갈 수 있는 충분한 성질과 요건을 '갖추어 만들어주다(자격을 주다)'.", cognates: "qualification(자격)", group: "3. 품질과 속성 (-qual-, -tend-)" },
            { word: "characteristic", meaning: "특성", root: "character(새겨진 자국) + istic → 찰흙에 도장이 꾹 찍히듯, 어떤 사람이나 사물에 깊게 새겨져서 남과 구분되는 고유한 '특성'.", cognates: "character(특징, 성격)", group: "3. 품질과 속성 (-qual-, -tend-)" },
            { word: "tendency", meaning: "경향, 흐름", root: "tend(뻗다, 향하다) + ency → 나뭇가지가 햇빛을 향해 뻗어가듯, 사람들의 마음이나 유행이 특정한 방향으로 자꾸 '기울고 뻗어가는 흐름'.", cognates: "extend(연장하다), tend(경향이 있다)", group: "3. 품질과 속성 (-qual-, -tend-)" },
            { word: "trendy", meaning: "최신 유행의", root: "trend(방향, 흐름) + y → 물이 빙글빙글 도는 방향처럼 대중들의 취향이 몰려가는 거대한 흐름(trend)을 발 빠르게 따라가는.", cognates: "trend(추세)", group: "3. 품질과 속성 (-qual-, -tend-)" },
            { word: "fashion, vogue", meaning: "유행", root: "fac(만들다) / vag(떠돌다) → 사람들이 새롭게 '만들어낸' 스타일(fashion)이나, 정착하지 않고 일시적으로 '떠도는(vag)' 유행(vogue).", cognates: "factory(공장), vague(모호한)", group: "3. 품질과 속성 (-qual-, -tend-)" },

            // [사치와 보증]
            { word: "luxury", meaning: "사치품", root: "lux(과도함, 삐뚤어짐) + ury → 꼭 필요한 수준을 넘어서서, 돈을 과도하게 쓰고 번쩍이는 것으로 치장하는 '사치'.", cognates: "deluxe(호화로운)", group: "4. 사치와 보증 (-lux-, -sure-)" },
            { word: "luxurious", meaning: "사치스러운", root: "lux(과도함) + urious → 눈이 부실 정도로 금이나 보석으로 치장되어 평범함을 넘어선 '사치스럽고 호화로운' 상태.", cognates: "luxury(사치)", group: "4. 사치와 보증 (-lux-, -sure-)" },
            { word: "extravagance", meaning: "호화, 사치(품)", root: "extra(밖으로) + vag(떠돌다) + ance → 정해진 예산의 울타리 '밖으로' 벗어나서 돈을 펑펑 쓰며 '떠도는' 지나친 낭비와 '사치'.", cognates: "vagabond(방랑자)", group: "4. 사치와 보증 (-lux-, -sure-)" },
            { word: "ensure", meaning: "보증하다", root: "en(~로 만들다) + sure(확실한) → 혹시 고장 나면 어쩌나 하는 의심을 없애고, 마음을 아주 '확실하게 만들어 주다(보증하다)'.", cognates: "assure(장담하다)", group: "4. 사치와 보증 (-lux-, -sure-)" },
            { word: "warranty", meaning: "보증(서)", root: "war(지켜보다, 보호하다) → 제품이 망가지지 않도록 회사가 끝까지 책임지고 '지켜봐 주겠다'고 약속하는 증서.", cognates: "guard(경호원), ward(병동)", group: "4. 사치와 보증 (-lux-, -sure-)" },
            { word: "money-back guarantee", meaning: "환불 보증", root: "guarantee(보호하다) → 물건이 마음에 안 들면 돈(money)을 그대로 돌려주겠다(back)고 강력하게 방패처럼 '보호하고 약속'하는 것.", cognates: "guarantor(보증인)", group: "4. 사치와 보증 (-lux-, -sure-)" },

            // [수량과 포함]
            { word: "amount", meaning: "양", root: "ad(~에) + mount(오르다, 산) → 물건이나 돈이 계속 더해져서 거대한 '산(mountain)처럼 높이 쌓여 올라간' 전체의 '양'.", cognates: "mountain(산)", group: "5. 수량과 포함 (-quant-, -clud-)" },
            { word: "sum", meaning: "합계, 전체", root: "summa(가장 높은 곳, 꼭대기) → 숫자들을 모두 더해서 피라미드의 '가장 꼭대기(최종 결과)'에 도달한 '합계'.", cognates: "summary(요약), summit(정상)", group: "5. 수량과 포함 (-quant-, -clud-)" },
            { word: "quantity", meaning: "양", root: "quant(얼마나 많은) + ity → 질(quality)이 아니라, 숫자로 셀 수 있거나 부피로 잴 수 있는 '얼마나 많은가'의 크기.", cognates: "quantify(양을 재다)", group: "5. 수량과 포함 (-quant-, -clud-)" },
            { word: "quantify", meaning: "양을 측정하다", root: "quant(얼마나 많은) + fy(만들다) → 눈에 보이지 않는 감정이나 가치를, 정확한 숫자로 세어서 '양으로 만들어 내다(측정하다)'.", cognates: "quantity(수량)", group: "5. 수량과 포함 (-quant-, -clud-)" },
            { word: "reduction", meaning: "축소, 삭감", root: "re(뒤로) + duc(이끌다) + tion → 가격이나 크기를 예전처럼 앞으로 밀고 나가지 않고, '뒤로 끌어내려' 줄이는 '축소'.", cognates: "reduce(줄이다), produce(생산하다)", group: "5. 수량과 포함 (-quant-, -clud-)" },
            { word: "include", meaning: "포함하다", root: "in(안에) + clud(가두다) → 어떤 사람이나 물건을 우리 무리의 울타리 '안으로' 집어넣어 문을 '닫아버리는(포함하다)' 것.", cognates: "conclude(결론짓다)", group: "5. 수량과 포함 (-quant-, -clud-)" },
            { word: "exclude, omit", meaning: "~을 빠뜨리다, 생략하다", root: "ex(밖으로)+clud(가두다) / ob(멀리)+mit(보내다) → 무리 '밖으로' 쫓아내어 문을 닫거나, '멀리 던져버려' 명단에서 완전히 '빠뜨리다'.", cognates: "emit(방출하다)", group: "5. 수량과 포함 (-quant-, -clud-)" },
            { word: "part", meaning: "일부", root: "part(나누다) → 전체 사과를 칼로 여러 조각으로 '나누었을 때', 그중 한 조각에 해당하는 '부분이나 일부'.", cognates: "particle(입자)", group: "5. 수량과 포함 (-quant-, -clud-)" },
            { word: "partial", meaning: "일부의", root: "part(부분) + ial → 100% 완전한 것이 아니라, 전체 중에서 쪼개진 일'부분'만 해당하여 덜 끝난.", cognates: "partially(부분적으로)", group: "5. 수량과 포함 (-quant-, -clud-)" },

            // [상태와 감정 (기타)]

            // [여행과 행동]
            { word: "navigation", meaning: "항해", root: "nav(배) + ig(몰다) + ation → 나침반이나 별빛에 의지하여 망망대해에서 조심스럽게 '배를 몰고' 목적지를 찾아가는 기술이나 '항해'.", cognates: "navy(해군), navigate(길을 찾다)", group: "3. 여행과 관찰 (-nav-, -spect-)" },
            { word: "voyage", meaning: "크루즈, 유람선 (여행)", root: "vi(길) → 짧은 소풍이 아니라, 거대한 유람선을 타고 바다 위주로 길(vi)을 개척하며 떠나는 길고 낭만적인 긴 '항해나 여행'.", cognates: "via(~을 경유하여), previous(이전의)", group: "3. 여행과 관찰 (-nav-, -spect-)" },
            { word: "sightsee", meaning: "유람하다, 구경하다", root: "sight(시야, 명소) + see(보다) → 유명한 유적지나 멋진 풍경(sight)을 눈에 담기 위해 여기저기 돌아다니며 '구경하다(see)'.", cognates: "sight(시각)", group: "3. 여행과 관찰 (-nav-, -spect-)" },
            { word: "spectacular", meaning: "장관인", root: "spect(보다) + acular → 눈을 뗄 수 없을 만큼 시선을 확 사로잡아, 평생 잊지 못할 정도로 스케일이 크고 멋진 '장관인' 풍경.", cognates: "spectator(관중), inspect(조사하다)", group: "3. 여행과 관찰 (-nav-, -spect-)" },
            { word: "advice", meaning: "사례금을 주다", root: "ad(~를 향해) + vis(보다) → (어원적 파생) 서비스 제공자에게 감사의 마음으로 좋은 관점을 보여주며(충고/격려), 팁(사례금)을 주는 행위.", cognates: "advise(조언하다), vision(시야)", group: "3. 여행과 관찰 (-nav-, -spect-)" },
            { word: "overseas", meaning: "해외로", root: "over(넘어서) + sea(바다) + s → 국경을 맞댄 옆 나라가 아니라, 넓고 깊은 바다를 비행기나 배로 훌쩍 '넘어가야만' 닿을 수 있는 '해외'.", cognates: "sea(바다)", group: "3. 여행과 관찰 (-nav-, -spect-)" },

            { word: "start", meaning: "출발하다", root: "고대영어(갑자기 움직이다) → 멈춰있던 기차나 발걸음이 첫 엔진을 켜고 놀란 듯 팍 하고 '갑자기 튀어 오르며 움직이기 시작하다'.", cognates: "startle(깜짝 놀라게 하다)", group: "4. 출발과 도착 (-part-, -rip-)" },
            { word: "arrive", meaning: "도착하다", root: "ad(~에) + ripa(강기슭) → 거친 바다를 항해하던 배가 마침내 목적지의 안전한 '강기슭에 무사히 닿아' 정박하며 '도착하다'.", cognates: "river(강), rival(경쟁자)", group: "4. 출발과 도착 (-part-, -rip-)" },
            { word: "check-in", meaning: "체크인", root: "check(대조하다) + in(안으로) → 호텔이나 공항에 들어가서(in) 예약 명단과 내 여권을 '대조하여(check)' 탑승/투숙 수속을 밟는 것.", cognates: "check(확인하다)", group: "4. 출발과 도착 (-part-, -rip-)" },
            { word: "move", meaning: "이동하다, 옮기다", root: "mov(움직이다) → 고정되어 있던 몸이나 짐을 힘을 가해서 물리적으로 다른 장소로 '움직여서 옮기다'.", cognates: "movement(움직임), movie(영화)", group: "4. 출발과 도착 (-part-, -rip-)" },
            { word: "rider", meaning: "타는 사람", root: "ride(타다) + er → 두 발로 걷지 않고 말이나 자전거, 기구 등의 등 위에 올라'타서' 조종하며 가는 사람.", cognates: "ride(타다)", group: "4. 출발과 도착 (-part-, -rip-)" },
            { word: "in use", meaning: "사용되고 있는", root: "in(~상태에) + use(사용) → 비행기 화장실에 불이 들어와 있듯, 누군가가 점유하여 활발하게 '사용하고 있는' 상태.", cognates: "use(사용하다)", group: "4. 출발과 도착 (-part-, -rip-)" },
            { word: "availability", meaning: "유용성", root: "a(~에) + vail(가치있다) + ability → 빈 방이나 빈 좌석이 남아 있어서, 내가 당장 돈을 내고 쓸모있게 '이용할 수 있는(가치 있는)' 능력이나 상태.", cognates: "avail(도움이 되다), valid(유효한)", group: "4. 출발과 도착 (-part-, -rip-)" }
        ]
    };

    let currentLesson = 13;
    let currentCardIndex = 0;
    let isFlipped = false;
    let currentFlatWordList = [];

    function setLesson(lessonNumber) {
        currentLesson = lessonNumber;
        currentCardIndex = 0;

        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.classList.remove('active');
            btn.classList.replace('text-teal-700', 'text-gray-500');
            btn.classList.replace('border-teal-700', 'border-transparent');
            btn.classList.remove('bg-teal-50');
            btn.classList.remove('font-extrabold');
        });
        const activeTab = document.getElementById(`tab-${lessonNumber}`);
        activeTab.classList.add('active');
        activeTab.classList.replace('text-gray-500', 'text-teal-700');
        activeTab.classList.replace('border-transparent', 'border-teal-700');
        activeTab.classList.add('bg-teal-50');
        activeTab.classList.add('font-extrabold');

        renderList();
    }

    function renderList() {
        const listView = document.getElementById('listView');
        let htmlContent = '';
        
        const words = db[currentLesson];
        currentFlatWordList = words;

        const groupedData = words.reduce((acc, word) => {
            if (!acc[word.group]) acc[word.group] = [];
            acc[word.group].push(word);
            return acc;
        }, {});

        for (const [groupName, groupWords] of Object.entries(groupedData)) {
            htmlContent += `
                <div class="mb-8">
                    <h2 class="text-[0.85rem] font-black text-teal-700 uppercase tracking-widest mb-3 pl-2 border-l-4 border-teal-500 shadow-sm py-1 bg-teal-50 rounded-r-lg">${groupName}</h2>
                    <div class="space-y-4">
            `;
            
            groupWords.forEach((item, index) => {
                const id = `word-${currentLesson}-${index}`;
                htmlContent += `
                    <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden hover:shadow-md transition-shadow duration-300">
                        <div class="p-4 flex justify-between items-center cursor-pointer active:bg-gray-50" onclick="toggleAccordion('${id}')">
                            <div class="pr-4">
                                <h3 class="text-lg font-bold text-gray-800 tracking-tight">${item.word}</h3>
                                <p class="text-sm font-medium text-gray-500 mt-0.5">${item.meaning}</p>
                            </div>
                            <div class="w-8 h-8 flex-shrink-0 flex justify-center items-center rounded-full bg-teal-50 text-teal-600">
                                <i id="icon-${id}" class="fa-solid fa-chevron-down transition-transform duration-300 text-sm"></i>
                            </div>
                        </div>
                        
                        <div id="content-${id}" class="accordion-content bg-gray-50 px-5 border-t border-gray-100">
                            <div class="mb-4 mt-2">
                                <span class="inline-flex items-center bg-teal-100 text-teal-800 text-[0.7rem] px-2.5 py-1 rounded-md font-bold mb-2 shadow-sm tracking-wide">
                                    <i class="fa-solid fa-book-open mr-1.5"></i>어원 스토리 (Semantic Shift)
                                </span>
                                <p class="text-[0.9rem] text-gray-700 leading-relaxed font-medium break-keep">${item.root}</p>
                            </div>
                            <div class="pb-3">
                                <span class="inline-flex items-center bg-amber-50 text-amber-700 border border-amber-200 text-[0.7rem] px-2.5 py-1 rounded-md font-bold mb-2 tracking-wide">
                                    <i class="fa-solid fa-link mr-1.5"></i>동계어 (Family)
                                </span>
                                <p class="text-sm text-gray-600 font-bold">${item.cognates}</p>
                            </div>
                        </div>
                    </div>
                `;
            });
            htmlContent += `</div></div>`;
        }
        listView.innerHTML = htmlContent;
        updateFlashcard();
    }

    function toggleAccordion(id) {
        const content = document.getElementById(`content-${id}`);
        const icon = document.getElementById(`icon-${id}`);
        
        if (content.classList.contains('open')) {
            content.classList.remove('open');
            icon.classList.remove('rotate-180');
        } else {
            content.classList.add('open');
            icon.classList.add('rotate-180');
        }
    }

    function toggleMode() {
        const flashcardView = document.getElementById('flashcardView');
        const modeBtn = document.getElementById('modeToggleBtn');
        
        if (flashcardView.classList.contains('hidden')) {
            flashcardView.classList.remove('hidden');
            flashcardView.classList.add('flex');
            modeBtn.innerHTML = '<i class="fa-solid fa-list mr-1"></i> 목록보기';
            updateFlashcard();
        } else {
            flashcardView.classList.add('hidden');
            flashcardView.classList.remove('flex');
            modeBtn.innerHTML = '<i class="fa-solid fa-clone mr-1"></i> 카드모드';
        }
    }

    function updateFlashcard() {
        const item = currentFlatWordList[currentCardIndex];
        document.getElementById('cardGroup').innerText = `${currentLesson}강 - ${item.group.substring(3)}`;
        document.getElementById('cardWord').innerText = item.word;
        document.getElementById('cardWordBack').innerText = item.word;
        document.getElementById('cardMeaning').innerText = item.meaning;
        document.getElementById('cardRoot').innerText = item.root;
        document.getElementById('cardCognates').innerText = item.cognates;
        
        document.getElementById('flashcardCounter').innerText = `${currentCardIndex + 1} / ${currentFlatWordList.length}`;
        
        if(isFlipped) {
            document.getElementById('flashcard').classList.remove('rotate-y-180');
            isFlipped = false;
        }
    }

    function flipCard() {
        const card = document.getElementById('flashcard');
        isFlipped = !isFlipped;
        if (isFlipped) {
            card.classList.add('rotate-y-180');
        } else {
            card.classList.remove('rotate-y-180');
        }
    }

    function prevCard() {
        currentCardIndex = (currentCardIndex > 0) ? currentCardIndex - 1 : currentFlatWordList.length - 1;
        updateFlashcard();
    }

    function nextCard() {
        currentCardIndex = (currentCardIndex < currentFlatWordList.length - 1) ? currentCardIndex + 1 : 0;
        updateFlashcard();
    }

    // 앱 초기화
    window.onload = () => {
        setLesson(13); // 시작 시 13강 선택
    };
</script>
</body>
</html>
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">

    <title>메타인지 단어장 (19강~20강)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        /* 기본 폰트 및 앱 스타일 */
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700;800&display=swap');
        body { font-family: 'Pretendard', sans-serif; background-color: #f1f5f9; overflow-x: hidden; }
        ::-webkit-scrollbar { width: 0px; background: transparent; }

        /* 아코디언 애니메이션 */
        .accordion-content { transition: max-height 0.4s cubic-bezier(0.4, 0, 0.2, 1), padding 0.4s ease, opacity 0.4s ease; max-height: 0; opacity: 0; overflow: hidden; }
        .accordion-content.open { max-height: 500px; opacity: 1; padding-top: 1rem; padding-bottom: 1rem; }
        
        /* 3D 카드 뒤집기 애니메이션 */
        .perspective-1000 { perspective: 1000px; }
        .transform-style-3d { transform-style: preserve-3d; }
        .backface-hidden { backface-visibility: hidden; }
        .rotate-y-180 { transform: rotateY(180deg); }
        .flip-card-inner { transition: transform 0.6s cubic-bezier(0.4, 0.2, 0.2, 1); }

        /* 탭 액티브 상태 스타일 (비즈니스 블루 톤) */
        .tab-btn.active { color: #1e40af; border-bottom-color: #1e40af; font-weight: 700; background-color: #dbeafe; }

        /* 앱 컨테이너 */
        .app-container { max-width: 480px; margin: 0 auto; background-color: #ffffff; min-height: 100vh; position: relative; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

<div class="app-container flex flex-col h-screen overflow-hidden">

</div>

            // 그룹 2: 지출과 소득 (-pend-, -come-)

            { word: "income", meaning: "수입, 소득", root: "in(안으로) + come(오다) → 일을 한 대가로 내 지갑이나 은행 통장 '안으로 들어오는(come in)' 돈, 즉 수입입니다.", cognates: "outcome(결과)", group: "2. 지출과 소득 (-pend-, -come-)" },
            { word: "pay off", meaning: "(빚 등을) 다 갚다; 성공하다, 성과를 올리다", root: "pay(지불하다) + off(떨어져, 완전히) → 남은 빚을 '완전히' 다 갚아서 털어내거나, 오랫동안 노력한 것이 마침내 열매를 맺어 큰 보상을 얻는 것.", cognates: "pay(지불하다)", group: "2. 지출과 소득 (-pend-, -come-)" },

            { word: "commerce", meaning: "상업, 통상, 교섭", root: "com(함께) + merc(장사하다) → 여러 상인들이 시장이나 항구에 '함께' 모여 대규모로 물건을 사고파는 활발한 '상업' 거래.", cognates: "merchant(상인), market(시장)", group: "3. 경제 흐름과 통화 (-eco-, -cur-)" },
            { word: "currency", meaning: "통화, 화폐; 유통", root: "cur(흐르다) + ency → 멈춰있는 것이 아니라 강물이 막힘없이 굽이쳐 흐르듯, 여러 사람들 사이의 손을 돌고 돌며 '유통되는' 돈.", cognates: "current(현재의, 흐름), occur(발생하다)", group: "3. 경제 흐름과 통화 (-eco-, -cur-)" },
            { word: "temporary", meaning: "일시적인, 임시의", root: "temp(시간) + orary → 영구적으로 영원히 계속되는 것이 아니라, 한정되고 정해진 찰나의 '시간' 동안만 짤막하게 존재하는 상태.", cognates: "tempo(속도), contemporary(동시대의)", group: "3. 경제 흐름과 통화 (-eco-, -cur-)" },
            { word: "annual", meaning: "1년의, 해마다의", root: "ann(1년) + ual → 태양이 365일마다 한 바퀴를 돌아 정확히 제자리로 오듯 '1년마다' 정기적으로 열리거나 주어지는.", cognates: "anniversary(기념일)", group: "3. 경제 흐름과 통화 (-eco-, -cur-)" },

            { word: "strategy", meaning: "전략, 계획", root: "stratos(군대) + agein(이끌다) → 고대 그리스에서 장군이 적군의 군대를 이기고 전쟁을 승리로 이끌기 위해 철저하게 짜내는 '전략'.", cognates: "strategic(전략적인)", group: "4. 가치 평가와 전략 (-val-, -neg-)" },

            { word: "risk", meaning: "위험, 모험", root: "라틴어 riscare(절벽을 항해하다) → 눈에 보이지 않는 뾰족한 암초가 숨어있는 바다를 향해 배를 모는 아슬아슬하고 '위험한' 투자나 모험.", cognates: "risky(위험한)", group: "4. 가치 평가와 전략 (-val-, -neg-)" },

            // 그룹 5: 경제적 상승과 하락 (변화)
            { word: "decline", meaning: "(가격) 하락; (가치가) 하락하다", root: "de(아래로) + clin(기울다) → 평평하던 길이나 산비탈이 갑자기 아래로 푹 꺼지듯 가격이나 회사의 가치가 바닥을 향해 꺾여 내려가는 모습.", cognates: "incline(기울이다), recline(비스듬히 기대다)", group: "5. 경제적 상승과 하락" },

            { word: "collapse", meaning: "붕괴되다, 무너지다, 폭락하다; 붕괴, 실패", root: "col(함께) + laps(미끄러지다) → 멀쩡하던 건물의 기둥들이 한꺼번에 우르르 '미끄러져' 바닥으로 주저앉으며 완전히 '폭락하고 붕괴하다'.", cognates: "lapse(경과, 소멸), relapse(재발하다)", group: "5. 경제적 상승과 하락" },

            { word: "lay off", meaning: "~을 해고하다", root: "lay(놓다) + off(떨어져서) → 원래 열심히 일하던 자리에서 억지로 도구를 '내려놓게' 하고 회사에서 멀리 떨어지게 하여 영원히 쉬게 하는 '해고'.", cognates: "layer(층), off(분리)", group: "5. 경제적 상승과 하락" },

    let currentLesson = 19; // 기본 19강 선택
    let currentCardIndex = 0;
    let isFlipped = false;
    let currentFlatWordList = [];

    // --- 단원 탭 전환 로직 ---
    function setLesson(lessonNumber) {
        currentLesson = lessonNumber;
        currentCardIndex = 0;

        // 탭 UI 스타일 업데이트 (블루 톤)
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.classList.remove('active');
            btn.classList.replace('text-blue-800', 'text-slate-500');
            btn.classList.replace('border-blue-800', 'border-transparent');
            btn.classList.remove('bg-blue-100');
        });
        const activeTab = document.getElementById(`tab-${lessonNumber}`);
        activeTab.classList.add('active');
        activeTab.classList.replace('text-slate-500', 'text-blue-800');
        activeTab.classList.replace('border-transparent', 'border-blue-800');
        activeTab.classList.add('bg-blue-100');

        renderList();
    }

    function renderList() {
        const listView = document.getElementById('listView');
        let htmlContent = '';
        
        const words = db[currentLesson];
        currentFlatWordList = words;

        // 그룹별 데이터 분류
        const groupedData = words.reduce((acc, word) => {
            if (!acc[word.group]) acc[word.group] = [];
            acc[word.group].push(word);
            return acc;
        }, {});

        for (const [groupName, groupWords] of Object.entries(groupedData)) {
            htmlContent += `
                <div class="mb-8">
                    <h2 class="text-[0.85rem] font-extrabold text-blue-700 uppercase tracking-widest mb-3 pl-1 border-l-4 border-blue-500">${groupName}</h2>
                    <div class="space-y-3">
            `;
            
            groupWords.forEach((item, index) => {
                const id = `word-${currentLesson}-${index}`;
                htmlContent += `
                    <div class="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden hover:shadow-md transition-shadow duration-300">
                        <div class="p-4 flex justify-between items-center cursor-pointer active:bg-slate-50" onclick="toggleAccordion('${id}')">
                            <div class="pr-4">
                                <h3 class="text-lg font-bold text-slate-800">${item.word}</h3>
                                <p class="text-sm font-medium text-slate-500 mt-0.5">${item.meaning}</p>
                            </div>
                            <div class="w-8 h-8 flex-shrink-0 flex justify-center items-center rounded-full bg-blue-50 text-blue-600">
                                <i id="icon-${id}" class="fa-solid fa-chevron-down transition-transform duration-300 text-sm"></i>
                            </div>
                        </div>
                        
                        <div id="content-${id}" class="accordion-content bg-slate-50 px-5 border-t border-slate-100">
                            <div class="mb-4 mt-2">
                                <span class="inline-flex items-center bg-blue-100 text-blue-800 text-xs px-2.5 py-1 rounded-md font-bold mb-2 shadow-sm">
                                    <i class="fa-solid fa-book-open mr-1.5"></i>어원 스토리 (Semantic Shift)
                                </span>
                                <p class="text-[0.9rem] text-slate-700 leading-relaxed font-medium break-keep">${item.root}</p>
                            </div>
                            <div class="pb-3">
                                <span class="inline-flex items-center bg-emerald-50 text-emerald-700 border border-emerald-100 text-xs px-2.5 py-1 rounded-md font-bold mb-2">
                                    <i class="fa-solid fa-link mr-1.5"></i>동계어 (Family)
                                </span>
                                <p class="text-sm text-slate-600 font-bold">${item.cognates}</p>
                            </div>
                        </div>
                    </div>
                `;
            });
            htmlContent += `</div></div>`;
        }
        listView.innerHTML = htmlContent;
        updateFlashcard();
    }

    // 아코디언 토글 애니메이션
    function toggleAccordion(id) {
        const content = document.getElementById(`content-${id}`);
        const icon = document.getElementById(`icon-${id}`);
        
        if (content.classList.contains('open')) {
            content.classList.remove('open');
            icon.classList.remove('rotate-180');
        } else {
            content.classList.add('open');
            icon.classList.add('rotate-180');
        }
    }

    function toggleMode() {
        const flashcardView = document.getElementById('flashcardView');
        const modeBtn = document.getElementById('modeToggleBtn');
        
        if (flashcardView.classList.contains('hidden')) {
            flashcardView.classList.remove('hidden');
            flashcardView.classList.add('flex');
            modeBtn.innerHTML = '<i class="fa-solid fa-list mr-1"></i> 목록보기';
            updateFlashcard();
        } else {
            flashcardView.classList.add('hidden');
            flashcardView.classList.remove('flex');
            modeBtn.innerHTML = '<i class="fa-solid fa-layer-group mr-1"></i> 카드모드';
        }
    }

    function updateFlashcard() {
        const item = currentFlatWordList[currentCardIndex];
        document.getElementById('cardGroup').innerText = `${currentLesson}강 - ${item.group.substring(3)}`; // 번호 제거
        document.getElementById('cardWord').innerText = item.word;
        document.getElementById('cardWordBack').innerText = item.word;
        document.getElementById('cardMeaning').innerText = item.meaning;
        document.getElementById('cardRoot').innerText = item.root;
        document.getElementById('cardCognates').innerText = item.cognates;
        
        document.getElementById('flashcardCounter').innerText = `${currentCardIndex + 1} / ${currentFlatWordList.length}`;
        
        if(isFlipped) {
            document.getElementById('flashcard').classList.remove('rotate-y-180');
            isFlipped = false;
        }
    }

    function flipCard() {
        const card = document.getElementById('flashcard');
        isFlipped = !isFlipped;
        if (isFlipped) {
            card.classList.add('rotate-y-180');
        } else {
            card.classList.remove('rotate-y-180');
        }
    }

    function prevCard() {
        currentCardIndex = (currentCardIndex > 0) ? currentCardIndex - 1 : currentFlatWordList.length - 1;
        updateFlashcard();
    }

    function nextCard() {
        currentCardIndex = (currentCardIndex < currentFlatWordList.length - 1) ? currentCardIndex + 1 : 0;
        updateFlashcard();
    }

    // 앱 초기 실행
    window.onload = () => {
        setLesson(19); // 19강 기본 시작
    };
</script>
